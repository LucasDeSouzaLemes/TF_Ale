<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | CloudSync Solutions</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .contact-form {
            background: var(--light);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
        }

        input,
        textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            background: white;
            font-family: inherit;
            transition: var(--transition);
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 210, 255, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 1.25rem;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .submit-btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <header>
        <a href="index.html" class="logo">CLOUD<span>SYNC</span></a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="container section" style="max-width: 700px;">
        <h1 style="margin-bottom: 1rem;">Vamos conversar?</h1>
        <p style="color: var(--text-muted); margin-bottom: 3rem;">Preencha o formulário abaixo e um de nossos
            consultores entrará em contato em breve.</p>

        <form class="contact-form" action="#" method="POST">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">
            </div>
            <div class="form-group">
                <label for="email">E-mail Corporativo</label>
                <input type="email" id="email" name="email" required placeholder="exemplo@empresa.com">
            </div>
            <div class="form-group">
                <label for="mensagem">Como podemos ajudar?</label>
                <textarea id="mensagem" name="mensagem" rows="5" required
                    placeholder="Descreva brevemente seu desafio tecnológico"></textarea>
            </div>
            <button type="submit" class="submit-btn">Enviar Solicitação</button>
        </form>
    </main>

    <footer class="footer">
        <p>&copy; 2026 CloudSync Solutions. Inovação e Confiança.</p>
    </footer>
</body>

</html>
