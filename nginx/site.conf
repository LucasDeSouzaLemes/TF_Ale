server {
    listen 80;
    server_name localhost;

    root /var/www/novatech/website;
    index index.html;

    # Logs Personalizados
    access_log /var/log/nginx/novatech_access.log;
    error_log /var/log/nginx/novatech_error.log;

    # Página 404 Personalizada
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Segurança: Bloquear acesso a arquivos ocultos
    location ~ /\. {
        deny all;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Permitir POST em arquivos estáticos (evita Erro 405)
    error_page 405 =200 $uri;
}
